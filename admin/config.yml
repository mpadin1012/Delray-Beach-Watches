backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site"
    label: "Site Settings"
    files:
      - label: "Homepage Content"
        name: "homepage"
        file: "content/site.json"
        fields:
          - { label: "Site Title", name: "siteTitle", widget: "string" }
          - { label: "Hero Headline", name: "heroHeadline", widget: "string" }
          - { label: "Hero Subheadline", name: "heroSubheadline", widget: "text" }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }

  - name: "inventory"
    label: "Inventory"
    files:
      - label: "Watch Listings"
        name: "watches"
        file: "content/watches.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} - {{fields.status}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["available", "sold"], default: "available" }
