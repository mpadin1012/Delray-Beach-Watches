<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delray Beach Watches</title>

<style>
:root {
  --bg:#0c0c0c;
  --panel:#151515;
  --text:#f5f1e8;
  --gold:#c6a66b;
  --border:rgba(198,166,107,0.2);
}

body{
  margin:0;
  font-family:Georgia,serif;
  background:#0c0c0c;
  color:var(--text);
}

header{
  text-align:center;
  padding:20px;
  color:var(--gold);
  font-size:22px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero img{
  width:100%;
  border-radius:12px;
}

.hero h1{
  font-size:32px;
  margin-top:15px;
}

.hero p{
  color:#cfc2a8;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  margin-top:20px;
}

.card{
  background:#151515;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.price{
  color:var(--gold);
}

.contact{
  margin-top:40px;
}

.contact-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.contact-card{
  background:#151515;
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
}

.contact-card strong{
  color:var(--gold);
}

.contact-card a{
  color:white;
  display:block;
  margin-top:5px;
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<header id="site-title">Delray Beach Watches</header>

<div class="container">

<div class="hero">
<img id="hero-image" src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49">
<h1 id="hero-headline">Curated Luxury Watches</h1>
<p id="hero-subheadline">Buy, sell, and trade premium timepieces in Delray Beach.</p>
</div>

<h2>Featured Inventory</h2>
<div class="grid" id="watch-grid"></div>

<div class="contact">
<h2>Contact</h2>

<div class="contact-grid">

<div class="contact-card">
<strong>Call</strong>
<a id="phone-link" href="tel:8504851221">850-485-1221</a>
</div>

<div class="contact-card">
<strong>Email</strong>
<a id="email-link" href="mailto:delraybeachwatches@gmail.com">delraybeachwatches@gmail.com</a>
</div>

<div class="contact-card">
<strong>Location</strong>
<span id="location">Delray Beach, Florida</span>
</div>

</div>
</div>

</div>

<script>
async function loadSite(){
 try{
  const res=await fetch('/content/site.json');
  if(!res.ok)return;
  const d=await res.json();

  document.getElementById('site-title').textContent=d.siteTitle||'Delray Beach Watches';
  document.getElementById('hero-headline').textContent=d.heroHeadline||'Curated Luxury Watches';
  document.getElementById('hero-subheadline').textContent=d.heroSubheadline||'Luxury timepieces';
  document.getElementById('hero-image').src=d.heroImage||'';

  const phone=d.phone||'850-485-1221';
  const email=d.email||'delraybeachwatches@gmail.com';
  const loc=d.location||'Delray Beach, Florida';

  const p=document.getElementById('phone-link');
  const e=document.getElementById('email-link');

  p.textContent=phone;
  p.href='tel:'+phone.replace(/[^0-9]/g,'');

  e.textContent=email;
  e.href='mailto:'+email;

  document.getElementById('location').textContent=loc;

 }catch(e){}
}

async function loadWatches(){
 try{
  const res=await fetch('/content/watches.json');
  if(!res.ok)return;
  const data=await res.json();
  const watches=data.items||[];
  const grid=document.getElementById('watch-grid');

  watches.forEach(w=>{
    const c=document.createElement('div');
    c.className='card';

    c.innerHTML=`
    <img src="${w.image||''}">
    <div class="card-content">
      <div>${w.name||''}</div>
      <div class="price">${w.price||''}</div>
      <p>${w.description||''}</p>
    </div>`;

    grid.appendChild(c);
  });

 }catch(e){}
}

loadSite();
loadWatches();
</script>

</body>
</html>
