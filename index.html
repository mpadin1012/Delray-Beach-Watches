<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delray Beach Watches</title>

<style>
:root{
  --bg:#0c0c0c;
  --panel:#151515;
  --text:#f5f1e8;
  --muted:#cfc2a8;
  --gold:#c6a66b;
  --border:rgba(198,166,107,0.2);
}

body{
  margin:0;
  font-family:Georgia,serif;
  background:var(--bg);
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  background:#0c0c0c;
  border-bottom:1px solid var(--border);
}

.topbar{
  max-width:1100px;
  margin:auto;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  color:var(--gold);
  font-size:22px;
}

.nav{
  display:flex;
  gap:15px;
  font-family:Arial;
}

.nav a{
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero{
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#151515;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.price{
  color:var(--gold);
}

.tab-bar{
  display:flex;
  gap:10px;
  margin:20px 0;
}

.tab-btn{
  padding:10px 15px;
  border-radius:20px;
  border:1px solid var(--border);
  background:#151515;
  color:white;
  cursor:pointer;
}

.tab-btn.active{
  background:var(--gold);
  color:black;
}

.contact{
  margin-top:40px;
}

.contact-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.contact-card{
  background:#151515;
  padding:20px;
  border-radius:12px;
  border:1px solid var(--border);
}

.contact-card strong{
  color:var(--gold);
  display:block;
  margin-bottom:8px;
}

.contact-card a{
  color:white;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr}
  .contact-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <div class="topbar">
    <div class="brand">Delray Beach Watches</div>
    <div class="nav">
      <a href="#inventory">Inventory</a>
      <a href="#inventory">Past Sales</a>
      <a href="#contact">Contact</a>
      <a href="https://instagram.com/delraybeachwatches" target="_blank">Instagram</a>
    </div>
  </div>
</header>

<div class="container">

<h2 id="inventory">Inventory</h2>

<div class="tab-bar">
  <button class="tab-btn active" onclick="setTab('available')">Inventory</button>
  <button class="tab-btn" onclick="setTab('sold')">Past Sales</button>
</div>

<div class="grid" id="watch-grid"></div>

<div class="contact" id="contact">
<h2>Contact</h2>

<div class="contact-grid">

<div class="contact-card">
<strong>Call</strong>
<a href="tel:8504851221">850-485-1221</a>
</div>

<div class="contact-card">
<strong>Email</strong>
<a href="mailto:delraybeachwatches@gmail.com">delraybeachwatches@gmail.com</a>
</div>

<div class="contact-card">
<strong>Location</strong>
Delray Beach, Florida
</div>

<div class="contact-card">
<strong>Follow Us</strong>
<a href="https://instagram.com/delraybeachwatches" target="_blank">@delraybeachwatches</a>
</div>

</div>
</div>

</div>

<script>
let allWatches=[];
let currentTab='available';

async function loadWatches(){
 const res=await fetch('/content/watches.json');
 const data=await res.json();
 allWatches=data.items||[];
 render();
}

function setTab(tab){
 currentTab=tab;
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 event.target.classList.add('active');
 render();
}

function render(){
 const grid=document.getElementById('watch-grid');
 grid.innerHTML='';

 allWatches
  .filter(w=> (w.status||'available')===currentTab)
  .forEach(w=>{
   const card=document.createElement('div');
   card.className='card';

   card.innerHTML=`
    <img src="${w.image||''}">
    <div class="card-content">
      <div>${w.name}</div>
      <div class="price">${w.price}</div>
      <p>${w.description}</p>
    </div>
   `;

   grid.appendChild(card);
 });
}

loadWatches();
</script>

</body>
</html>
